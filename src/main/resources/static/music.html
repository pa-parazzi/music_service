<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <link rel="stylesheet" href="/css/defaultHeader.css">
    <link rel="stylesheet" href="/css/musicMain.css">
</head>
<body>

<input type="checkbox" id="side-checkbox">

<header class="header">
    <div class="header-left">
        <!-- кнопка открытия -->
        <label class="menu-btn" for="side-checkbox" aria-label="Открыть меню">&#9776;</label>
        <h1>Моя музыка</h1>
    </div>
    <nav id="sign-in/up-buttons" class="nav-buttons">
        <a href="/login.html" class="button">Sign in</a>
        <a href="/registration.html" class="button">Sign up</a>
    </nav>
    <div class="userInfo" id="userInfo"></div>
</header>

<!-- боковая панель -->
<aside class="side-panel" role="search" aria-label="Боковая панель">
    <div class="side-header">
        <!-- стрелка назад -->
        <label class="side-button-2" for="side-checkbox" aria-label="Назад">&larr;</label>
        <div class="side-title">Панель</div>
    </div>
    <p>Сюда можно поместить пункты меню, настройки и т.д.</p>
</aside>

<!-- затемнение -->
<label class="overlay" for="side-checkbox" aria-hidden="true"></label>

<div id="albums" class="albums"></div>

<div id="player-bar">
    <audio id="player" controls>
        <source id="audioSource" type="audio/mpeg">
    </audio>
</div>


<script>
    /* --- централизованные утилиты и замок --- */
    let refreshInProgress = null;

    function clearAuth() {
        localStorage.removeItem("jwt");
    }

    /* --- безопасный парсер JSON --- */
    async function safeParseJson(response) {
        const contentType = response.headers.get("Content-Type") || "";
        if (!response.ok) return null;
        if (response.status === 204) return null;
        if (!contentType.includes("application/json")) {
            try { return await response.json(); } catch (e) { return null; }
        }
        try {
            return await response.json();
        } catch (e) {
            console.warn("safeParseJson: no JSON body", e);
            return null;
        }
    }

    /* --- refreshAccessToken с "замком" --- */
    async function refreshAccessToken() {
        if (refreshInProgress) return refreshInProgress;

        refreshInProgress = (async () => {
            try {
                const res = await fetch('/api/auth/refresh', {
                    method: "POST",
                    credentials: "include"
                });

                if (!res.ok) {
                    console.warn("refreshAccessToken: refresh не удался");
                    clearAuth();
                    return false;
                }

                const data = await safeParseJson(res);
                const token = data && (data["jwt-token"] || data["jwt_token"] || data.accessToken || data.token);

                if (!token) {
                    console.warn("refreshAccessToken: ответ не содержит jwt");
                    clearAuth();
                    return false;
                }

                localStorage.setItem("jwt", token);
                console.log("Access token обновлён");
                return true;
            } catch (e) {
                console.error("refreshAccessToken error:", e);
                clearAuth();
                return false;
            } finally {
                refreshInProgress = null;
            }
        })();

        return refreshInProgress;
    }

    /* --- Обёртка для запросов с авторизацией и auto-refresh --- */
    async function apiFetch(url, options = {}) {
        options = { ...options };
        const headers = { ...(options.headers || {}) };

        // ждём, если в данный момент выполняется refresh
        if (refreshInProgress) await refreshInProgress;

        const token = localStorage.getItem("jwt");

        // Добавляем Authorization только если токен есть
        if (token) {
            headers["Authorization"] = "Bearer " + token;
        } else {
            delete headers["Authorization"];
        }

        options.headers = headers;
        options.credentials = "include";

        let response;

        try {
            response = await fetch(url, options);
        } catch (e) {
            console.error("apiFetch network error:", e);
            throw e;
        }

        // Если токена нет, то просто возвращаем ответ без попытки refresh
        if (!token) {
            return response;
        }

        // Если токен истёк — пробуем обновить и повторить запрос
        if (response.status === 401 || response.status === 403) {
            const refreshed = await refreshAccessToken();
            if (refreshed) {
                const newToken = localStorage.getItem("jwt");
                const retryHeaders = { ...headers };

                if (newToken) {
                    retryHeaders["Authorization"] = "Bearer " + newToken;
                } else {
                    delete retryHeaders["Authorization"];
                }

                try {
                    response = await fetch(url, {
                        ...options,
                        headers: retryHeaders,
                        credentials: "include"
                    });
                } catch (e) {
                    console.error("apiFetch retry error:", e);
                    throw e;
                }
            }
        }

        return response;
    }


    /* --- Загрузка профиля --- */
    async function loadProfile() {
        const nav = document.getElementById("sign-in/up-buttons");
        const userInfoDiv = document.getElementById("userInfo");

        try {
            const response = await apiFetch("http://localhost:8080/lk/profile", {
                method: "GET"
            });

            if (response.ok) {
                const user = await response.json();

                nav.style.display = "none";
                userInfoDiv.innerHTML = `
                    <img src="${user.avatar?.url}" alt="avatar">
                    <span>${user.username}</span>
                    <button id="logoutBtn" class="logout-btn">Выйти</button>
                `;

                const logoutBtn = document.getElementById("logoutBtn");
                logoutBtn.addEventListener("click", logout);

                userInfoDiv.style.display = "block";
            } else {
                clearAuth();
                userInfoDiv.style.display = "none";
                nav.style.display = "flex";
                console.warn("Сессия истекла или токен недействителен");
            }
        } catch (error) {
            console.error("Ошибка загрузки профиля:", error);
            userInfoDiv.style.display = "none";
            nav.style.display = "flex";
        }
    }

    /* --- Logout --- */
    async function logout() {
        try {
            const response = await apiFetch("http://localhost:8080/api/auth/logout", {
                method: "POST",
                credentials: "include"
            });

            clearAuth();
            if (response.ok) {
                console.log("Выход выполнен успешно");
                window.location.href = "/music.html";
            } else {
                console.warn("Ошибка при выходе:", response.status);
            }
        } catch (error) {
            console.error("Ошибка logout:", error);
        }
    }

    function escapeHtml(str = '') {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    async function loadAlbums() {
        try {
            const res = await fetch('http://localhost:8080/music');
            const data = await res.json();

            console.log("Загруженные альбомы:", data);

            const albumsContainer = document.getElementById('albums');
            albumsContainer.innerHTML = '';

            data.albums.forEach(album => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <div class="cover-wrapper">
                        <img src="${album.albumImage.url}" alt="${escapeHtml(album.title)}" class="album-cover">
                        <button class="play-btn" aria-label="Play ${escapeHtml(album.title)}">▶</button>
                    </div>
                    <div class="album-meta">
                        <div class="album-title">${escapeHtml(album.title)}</div>
                        <div class="artist-name">${escapeHtml(album.artist.name)}</div>
                    </div>
                `;

                card.querySelector('.play-btn').addEventListener('click', e => {
                    e.stopPropagation();
                    playAlbum(album);
                });

                albumsContainer.appendChild(card);
            });

        } catch (err) {
            console.error('Ошибка загрузки альбомов:', err);
        }
    }

    /* ==============================
       === Логика плеера ===
    =============================== */

    const player = document.getElementById('player');
    const audioSource = document.getElementById('audioSource');

    let currentAlbum = null;
    let currentTrack = 0;

    function playAlbum(album) {
        if (!album || !album.soundList || album.soundList.length === 0) {
            console.warn('Альбом пуст или не найден');
            return;
        }

        // остановим предыдущее проигрывание
        try {
            player.pause();
            player.currentTime = 0;
        } catch {}

        currentAlbum = album;
        currentTrack = 0;

        console.log(`▶️ Запущен альбом: ${album.title}`);
        playTrack(currentAlbum.soundList[currentTrack]);

        // обработчик завершения трека
        player.onended = () => {
            currentTrack++;
            if (currentTrack < currentAlbum.soundList.length) {
                playTrack(currentAlbum.soundList[currentTrack]);
            } else {
                console.log('Альбом закончился');
            }
        };
    }

    function playTrack(track) {
        if (!track?.url) {
            console.warn('❌ Трек не содержит URL');
            return;
        }
        console.log(`🎵 Воспроизводится трек: ${track.title}`);

        audioSource.src = track.url;
        player.load();
        player.play().catch(err => console.warn('Ошибка play():', err));
    }

    /* --- Инициализация при загрузке страницы --- */
    document.addEventListener("DOMContentLoaded", async () => {
        await loadProfile();
        await loadAlbums();
    });
</script>
</body>
</html>
