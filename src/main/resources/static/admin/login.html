<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AdminPage</title>
    <linK rel="stylesheet" href="/css/loginForm.css">
</head>
<body>

<form id="loginForm">
    <label for="username">Имя пользователя: </label>
    <input type="text" name="username" id="username">
    <div id="usernameError" class="error"></div>

    <label for="password">Пароль: </label>
    <input type="password" name="password" id="password">
    <div id="passwordError" class="error"></div>

    <div id="errorMessage" class="message errorMessage"></div>
    <div id="feedback" class="message successMessage"></div>

    <button type="submit">Вход</button>
</form>

<script>

    function showFieldError(fieldId, message) {
        const errorDiv = document.getElementById(fieldId + "Error");
        errorDiv.textContent = message;
        errorDiv.style.display="block";
    }

    function clearMessages() {
        const usernameMsg = document.getElementById("usernameError");
        const passwordMsg = document.getElementById("passwordError");

        const errorMsg = document.getElementById("errorMessage");
        const feedback = document.getElementById("feedback");

        usernameMsg.style.display = "none";
        usernameMsg.textContent = "";
        passwordMsg.style.display = "none";
        passwordMsg.textContent = "";

        errorMsg.style.display = "none";
        errorMsg.textContent = "";
        feedback.style.display = "none";
        feedback.textContent = "";
    }

    const form = document.getElementById("loginForm");

    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearMessages();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch("http://localhost:8080/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            if (!response.ok) {
                const errorJson = await response.json();

                if (errorJson.username) {
                    showFieldError("username", errorJson.username);
                }
                if (errorJson.password) {
                    showFieldError("password", errorJson.password);
                }

                if (errorJson.error || errorJson.message) {
                    const errorMsg = document.getElementById("errorMessage");
                    errorMsg.textContent = errorJson.error || errorJson.message;
                    errorMsg.style.display = "block";
                }
            } else if (response.ok) {
                const data = await response.json();
                localStorage.setItem("jwt", data.jwt_token);
                window.location.href="/admin/main.html";
            }
        } catch (error) {
            const errorMsg = document.getElementById("errorMessage");
            errorMsg.textContent = "Необработанная ошибка";
            errorMsg.style.display = "block";
        }
    });
</script>

</body>
</html>
