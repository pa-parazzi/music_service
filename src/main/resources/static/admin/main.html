<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/css/headerAndBody.css">
    <link rel="stylesheet" href="/css/userInfo.css">
</head>
<body>

<header class="header">
    <h1>Админ панель</h1>
    <nav id="sign-in/up-buttons" class="nav-buttons">
        <a href="/auth/login.html" class="button">Sign in</a>
        <a href="/auth/registration.html" class="button">Sign up</a>
    </nav>
    <div class="userInfo" id="userInfo"></div>
</header>

<main class="main-content">
    <section class="import-section">
        <h2>Импорт музыкальных данных</h2>
        <button id="importBtn" class="button">Загрузить в бд</button>
        <div id="importStatus" class="upload-status"></div>
    </section>
</main>

<script>
    /* --- централизованные утилиты и замок --- */
    let refreshInProgress = null;

    function clearAuth() {
        localStorage.removeItem("jwt");
    }

    /* --- refreshAccessToken с "замком" --- */
    async function refreshAccessToken() {
        if (refreshInProgress) return refreshInProgress;

        refreshInProgress = (async () => {
            try {
                const res = await fetch("/api/auth/refresh", {
                    method: "POST",
                    credentials: "include"
                });

                if (!res.ok) {
                    clearAuth();
                    return false;
                }

                const data = await res.json();
                if (!data.accessToken) {
                    clearAuth();
                    return false;
                }

                localStorage.setItem("jwt", data.accessToken);
                return true;
            } catch (e) {
                clearAuth();
                return false;
            } finally {
                refreshInProgress = null;
            }
        })();

        return refreshInProgress;
    }


    /* --- Обёртка для запросов с авторизацией и auto-refresh --- */
    async function apiFetch(url, options = {}) {
        if (refreshInProgress) await refreshInProgress;

        const headers = { ...(options.headers || {}) };
        const token = localStorage.getItem("jwt");

        if (token) {
            headers.Authorization = "Bearer " + token;
        }

        const response = await fetch(url, {
            ...options,
            headers,
            credentials: "include"
        });

        if ((response.status === 401 || response.status === 403) && token) {
            const refreshed = await refreshAccessToken();
            if (!refreshed) return response;

            const newToken = localStorage.getItem("jwt");
            if (!newToken) return response;

            headers.Authorization = "Bearer " + newToken;

            return fetch(url, {
                ...options,
                headers,
                credentials: "include"
            });
        }

        return response;
    }

    /* --- Загрузка профиля --- */
    async function loadProfile() {

        const nav = document.getElementById("sign-in/up-buttons");
        const userInfoDiv = document.getElementById("userInfo");

        window.currentUser = null;

        try {
            const response = await apiFetch('/admin/main', {
                method: "GET"
            });

            if (response.ok) {
                const user = await response.json();
                window.currentUser = user;

                nav.style.display = "none";
                userInfoDiv.innerHTML = `
            <div class="profile-menu">
              <button class="avatar-btn" id="avatar-btn">
                   <img src="${user.avatar?.url}" alt="avatar">
              </button>

              <div class="profile-drop-down" id="profile-drop-down">
                   <div class="profile-name">${user.username}</div>
                   <button id="logoutBtn" class="logout-btn">Выйти</button>
              </div>
            </div>
            `;

                const avatarBtn = document.getElementById("avatar-btn");
                const dropDown = document.getElementById("profile-drop-down");

                avatarBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    dropDown.classList.toggle("open", true);
                });

                document.addEventListener("click", ()=> {
                    dropDown.classList.toggle("open", false);
                });

                const logoutBtn = document.getElementById("logoutBtn");
                logoutBtn.addEventListener("click", logout);

                userInfoDiv.style.display = "block";
            } else {
                clearAuth();
                userInfoDiv.style.display = "none";
                nav.style.display = "flex";
                console.warn("Сессия истекла или токен недействителен");
            }
        } catch (error) {
            console.error("Ошибка загрузки профиля:", error);
            userInfoDiv.style.display = "none";
            nav.style.display = "flex";
        }
        return window.currentUser;
    }

    /* --- Logout --- */
    async function logout() {
        try {
            const response = await apiFetch('/api/auth/logout', {
                method: "POST",
                credentials: "include"
            });

            clearAuth();
            if (response.ok) {
                console.log("Выход выполнен успешно");
                window.location.href = "/music/main.html";
            } else {
                console.warn("Ошибка при выходе:", response.status);
            }
        } catch (error) {
            console.error("Ошибка logout:", error);
        }
    }
    window.loadUser = loadProfile();
</script>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const importBtn = document.getElementById("importBtn");
        const statusDiv = document.getElementById("importStatus");

        importBtn.addEventListener("click", async () => {
            statusDiv.textContent = "Импорт начался...";

            try {
                const response = await apiFetch('/admin/upload', {
                    method: "POST",
                });

                if (response.ok) {
                    statusDiv.textContent = "Импорт успешно завершён!";
                } else {
                    const errText = await response.text();
                    statusDiv.textContent = "Ошибка при импорте: " + (errText || response.status);
                }
            } catch (error) {
                console.error("Ошибка при запуске импорта:", error);
                statusDiv.textContent = "Не удалось запустить импорт.";
            }
        });
    });
</script>

</body>
</html>
