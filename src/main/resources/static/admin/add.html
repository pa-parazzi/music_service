<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Artist</title>
    <link rel="stylesheet" href="/css/adminAddStyle.css">
</head>
<body>
<form id="formArtist">
    <label for="name">Исполнитель </label>
    <input type="text" id="name"><br/>

    <div id="albumsContainer">
        <label>Альбомы</label>
        <input type="text" class="albumInput">
    </div>
    <button type="button" onclick="addAlbum()">Добавить альбом</button><br/>

    <div id="soundsContainer">
        <label>Список песен</label>
        <input type="text" class="soundInput" placeholder="Название">
        <input type="number" class="durationInput" placeholder="Длительность (сек)">
        <input type="text" class="keyInput" placeholder="Ключ (key)">
    </div>
    <button type="button" onclick="addSound()">Добавить песню</button><br/>

    <button type="submit">Создать</button>
</form>

<div id="feedback"></div>

<script>
    function showMessage(type, text) {
        const feedback = document.getElementById("feedback");
        feedback.textContent = text;
        feedback.style.color = type === "error" ? "red" : "green";
    }

    function addAlbum() {
        const div = document.createElement("div");
        div.innerHTML = `<input type="text" class="albumInput" placeholder="Название альбома">`;
        document.getElementById("albumsContainer").appendChild(div);
    }

    function addSound() {
        const div = document.createElement("div");
        div.innerHTML = `
        <input type="text" class="soundInput" placeholder="Название">
        <input type="number" class="durationInput" placeholder="Длительность (сек)">
        <input type="text" class="keyInput" placeholder="Ключ (key)">
    `;
        document.getElementById("soundsContainer").appendChild(div);
    }

    document.getElementById("formArtist").addEventListener("submit", async (event) => {
        event.preventDefault();

        const name = document.getElementById("name").value;

        // Собираем альбомы
        const albums = Array.from(document.querySelectorAll(".albumInput"))
            .map(input => ({ title: input.value }))
            .filter(a => a.title.trim() !== "");

        // Собираем песни
        const sounds = [];
        const soundInputs = document.querySelectorAll(".soundInput");
        const durationInputs = document.querySelectorAll(".durationInput");
        const keyInputs = document.querySelectorAll(".keyInput");

        for (let i = 0; i < soundInputs.length; i++) {
            if (soundInputs[i].value.trim() !== "") {
                sounds.push({
                    title: soundInputs[i].value,
                    duration: parseInt(durationInputs[i].value) || 0,
                    key: keyInputs[i].value
                });
            }
        }

        const musicDto = {
            artist: { name: name },
            albums: albums,
            soundList: sounds
        };

        try {
            const response = await fetch("http://localhost:8080/admin/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + localStorage.getItem("jwt")
                },
                body: JSON.stringify(musicDto)
            });

            if (!response.ok) {
                const errorJson = await response.json();
                showMessage("error", errorJson.message || "Ошибка сохранения");
            } else {
                showMessage("success", "Артист добавлен");
            }
        } catch (error) {
            showMessage("error", "Необработанная ошибка");
        }
    });
</script>
</body>

</html>
