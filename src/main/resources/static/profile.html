<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="/css/defaultHeader.css">
</head>
<body>

<div id="profile"></div>

<script>
    async function loadProfile(){
        const token = localStorage.getItem("jwt");

        const response = await fetch("http://localhost:8080/lk/profile", {
            method: "GET",
            headers:{
                "Authorization": "Bearer " + token
            }
        });

        if(response.ok){
            const user = await response.json();
            document.getElementById("profile").textContent =
                `Имя пользователя: ${user.username}, Email: ${user.email}`;
        } else {
            document.getElementById("profile").textContent = "Ошибка загрузки профиля";
        }
    }

    loadProfile();
</script>

</body>
</html>
