<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/css/headerAndBody.css">
    <link rel="stylesheet" href="/css/loginAndRegistrationForm.css">
</head>
<body>

<input type="checkbox" id="side-checkbox">

<header class="header">
    <div class="header-left">
        <!-- кнопка открытия -->
        <label class="menu-btn" for="side-checkbox" aria-label="Открыть меню">&#9776;</label>
        <h1>Регистрация</h1>
    </div>
    <nav class="nav-buttons">
        <a href="/auth/login.html" class="button">Sign in</a>
        <a href="/auth/registration.html" class="button">Sign up</a>
    </nav>
</header>

<!-- боковая панель -->
<aside class="side-panel" role="search" aria-label="Боковая панель">
    <div class="side-header">
        <!-- стрелка назад -->
        <label class="side-button-2" for="side-checkbox" aria-label="Назад">&larr;</label>
        <div class="side-title">Панель</div>
    </div>
    <p>Сюда можно поместить пункты меню, настройки и т.д.</p>
</aside>

<!-- затемнение -->
<label class="overlay" for="side-checkbox" aria-hidden="true"></label>

<div class="form-wrapper">
    <form class="registration-form" id="registration-form" enctype="multipart/form-data">
        <label for="username">Имя пользователя: </label>
        <input type="text" id="username" required>
        <div id="usernameError" class="error"></div>
        <br/>

        <label for="password">Пароль: </label>
        <input type="password" id="password" required>
        <div id="passwordError" class="error"></div>
        <br/>

        <label for="email">Почта: </label>
        <input type="email" id="email" required>
        <div id="emailError" class="error"></div>
        <br/>

        <label for="date_of_birth">Дата рождения: </label>
        <input type="text" id="date_of_birth" required>
        <div id="dateOfBirthError" class="error"></div>
        <br/>

        <label for="avatar">Аватар: </label>
        <input type="file" id="avatar" accept="image/*">
        <div id="avatarError" class="error"></div>

        <div id="feedback" class="message successMessage"></div>
        <div id="errorMessage" class="message errorMessage"></div>
        <br/>

        <button type="submit">Зарегистрироваться</button>
    </form>
</div>

<script src="/js/auth/registration.js"></script>
</body>
</html>
