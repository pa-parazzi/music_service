<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Жанр</title>
    <link rel="stylesheet" href="/css/headerAndBody.css">
    <link rel="stylesheet" href="/css/audioPlayer.css">
    <link rel="stylesheet" href="/css/userInfo.css">
    <link rel="stylesheet" href="/css/genre.css">
</head>

<body>
<input type="checkbox" id="side-checkbox">

<header class="header">
    <div class="header-left">
        <label class="menu-btn" for="side-checkbox" aria-label="Открыть меню">&#9776;</label>
        <a href="/music/main.html" class="logo">&#8962;</a>
        <h1>Жанры</h1>
    </div>

    <form id="search-form" class="search-form">
        <input id="search-input" type="text" name="fragment" placeholder="Введите название альбома">
        <button id="search-button" type="submit">&#128270;</button>
    </form>

    <nav id="sign-in/up-buttons" class="nav-buttons">
        <a href="/auth/login.html" class="button">Sign in</a>
        <a href="/auth/registration.html" class="button">Sign up</a>
    </nav>
    <div class="userInfo" id="userInfo"></div>
</header>

<!-- боковая панель -->
<aside class="side-panel" role="search" aria-label="Боковая панель">
    <div class="side-header">
        <!-- стрелка назад -->
        <label class="side-button-2" for="side-checkbox" aria-label="Назад">&larr;</label>
        <div class="side-title">Панель</div>
    </div>
    <div class="trackCollection" id="trackCollection">
        <a href="/collection/tracks">
            <button class="side-panel-btn">Понравившиеся песни</button>
        </a>
    </div>
    <div class="albumCollection" id="albumCollection">
        <a href="/collection/albums">
            <button class="side-panel-btn">Понравившиеся альбомы</button>
        </a>
    </div>
    <div class="genres">
        <a href="/genre">
            <button class="side-panel-btn">Жанры</button>
        </a>
    </div>
</aside>

<!-- затемнение -->
<label class="overlay" for="side-checkbox" aria-hidden="true"></label>

<div class="genres" id="genres"></div>

<audio id="player"></audio>

<!-- Кастомный плеер -->
<div id="audio-player">
    <div class="player-controls">
        <button id="prev-btn">⏮</button>
        <button id="play-btn">▶</button>
        <button id="next-btn">⏭</button>
    </div>

    <div class="player-progress">
        <span id="current-time">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0.1">
        <span id="duration">0:00</span>
    </div>

    <div class="player-volume">
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.1">
    </div>
</div>

<script type="module" src="/js/genre/loadGenres.js"></script>
<script type="module" src="/js/audio/audioPlayer.js"></script>

</body>
</html>
