<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Альбом</title>
    <link rel="stylesheet" href="/css/headerAndBody.css">
    <link rel="stylesheet" href="/css/userInfo.css">
    <link rel="stylesheet" href="/css/album.css">
    <link rel="stylesheet" href="/css/audioPlayer.css">
</head>
<body>

<input type="checkbox" id="side-checkbox">

<header class="header">
    <div class="header-left">
        <!-- кнопка открытия -->
        <label class="menu-btn" for="side-checkbox" aria-label="Открыть меню">&#9776;</label>
        <h1>Моя музыка</h1>
    </div>
    <nav id="sign-in/up-buttons" class="nav-buttons">
        <a href="/auth/login.html" class="button">Sign in</a>
        <a href="/auth/registration.html" class="button">Sign up</a>
    </nav>
    <div class="userInfo" id="userInfo"></div>
</header>

<!-- боковая панель -->
<aside class="side-panel" role="search" aria-label="Боковая панель">
    <div class="side-header">
        <!-- стрелка назад -->
        <label class="side-button-2" for="side-checkbox" aria-label="Назад">&larr;</label>
        <div class="side-title">Панель</div>
    </div>
    <p>Сюда можно поместить пункты меню, настройки и т.д.</p>
</aside>

<!-- затемнение -->
<label class="overlay" for="side-checkbox" aria-hidden="true"></label>

<div class="album-page">
    <div class="album-header">
        <div class="album-cover">
            <img id="album-image" src="" alt="Обложка альбома" class="album-image">
            <button id="play-album" class="play-btn" aria-label="Play album">▶</button>
        </div>
        <div class="album-details">
            <h1 id="album-title" class="album-title"></h1>
            <p id="album-artist" class="album-artist"></p>
        </div>
    </div>

    <div class="tracklist" id="tracklist"></div>
</div>

<audio id="player"></audio>

<!-- Кастомный плеер -->
<div id="audio-player">
    <div class="player-controls">
        <button id="prev-btn">⏮</button>
        <button id="play-btn">▶</button>
        <button id="next-btn">⏭</button>
    </div>

    <div class="player-progress">
        <span id="current-time">0:00</span>
        <input type="range" id="progress" min="0" max="100" value="0.1">
        <span id="duration">0:00</span>
    </div>

    <div class="player-volume">
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.1">
    </div>
</div>

<script src="/js/audioPlayer.js"></script>
<script src="/js/loadUserProfile.js"></script>

<script>
    const player = document.getElementById('player');
    const playAlbumBtn = document.getElementById('play-album');
    const albumTitle = document.getElementById('album-title');
    const albumArtist = document.getElementById('album-artist');
    const albumImage = document.getElementById('album-image');
    const tracklistEl = document.getElementById('tracklist');

    let currentAlbum = null;
    let currentTrackIndex = 0;

    function escapeHtml(str = '') {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    async function loadAlbum() {
        const id = window.location.pathname.split('/').pop();
        try {
            const response = await fetch(`/api/album/${id}`);
            if (!response.ok) throw new Error(`Ошибка загрузки: ${response.status}`);
            const album = await response.json();
            currentAlbum = album;

            // Заполняем заголовок и обложку
            albumTitle.textContent = album.title;

            // Кликабельное имя исполнителя, с переходом на страницу исполнителя
            albumArtist.innerHTML = '';
            const link = document.createElement('a');
            link.href = `/artist/${album.artist.id}`;
            link.textContent = album.artist.name;
            link.className = 'artist-name-link';
            albumArtist.appendChild(link);

            albumImage.src = album.albumImage.url;
            albumImage.alt = escapeHtml(album.title);

            // Треклист
            tracklistEl.innerHTML = album.soundList.map((track, i) => `
        <div class="track" id="track" data-index="${i}">
          <div class="track-title">
            <span>${i + 1}.</span>
            <span>${escapeHtml(track.title)}</span>
          </div>
          <div class="track-duration">${formatTime(Math.floor(track.duration || 0))}</div>
        </div>
      `).join('');

            // Навешиваем обработчики клика
            document.querySelectorAll('.track').forEach(trackEl => {
                trackEl.addEventListener('click', () => {
                    const index = Number(trackEl.dataset.index);
                    playTrack(index);
                });
            });

            // Проигрывание альбома
            playAlbumBtn.addEventListener('click', () => {
                playTrack(0);
            });

            // Автоматически переходит к следующему треку
            player.addEventListener('ended', () => {
                if (!currentAlbum) return;
                if (currentTrackIndex < currentAlbum.soundList.length - 1) {
                    playTrack(currentTrackIndex + 1);
                }
            });

        } catch (err) {
            console.error('Ошибка загрузки альбома:', err);
        }
    }

    function playTrack(index) {
        if (!currentAlbum) return;
        const track = currentAlbum.soundList[index];
        currentTrackIndex = index;
        player.src = track.url;
        player.play();

        // Обновляем визуально активный трек
        document.querySelectorAll('.track').forEach((el, i) => {
            el.classList.toggle('active', i === index);
        });

        const playBtn = document.getElementById('play-btn');
        playBtn.textContent = "⏸";
    }

    // ===== Следующий трек =====
    nextBtn.addEventListener("click", () => {
        if (!currentAlbum) return;
        if (currentTrackIndex < currentAlbum.soundList.length - 1) {
            playTrack(currentTrackIndex + 1);
        }
    });

    // ===== Предыдущий трек =====
    prevBtn.addEventListener("click", () => {
        if (!currentAlbum) return;
        if (currentTrackIndex > 0) {
            playTrack(currentTrackIndex - 1);
        }
    });

    // ===== Автоматический переход к следующему треку =====
    player.addEventListener("ended", () => {
        if (!currentAlbum) return;
        if (currentTrackIndex < currentAlbum.soundList.length - 1) {
            playTrack(currentTrackIndex + 1);
        }
    });
    loadAlbum();
</script>
</body>
</html>
