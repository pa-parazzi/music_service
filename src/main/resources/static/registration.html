<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="/css/headerAndBody.css">
    <link rel="stylesheet" href="/css/loginAndRegistrationForm.css">
</head>
<body>

<input type="checkbox" id="side-checkbox">

<header class="header">
    <div class="header-left">
        <!-- кнопка открытия -->
        <label class="menu-btn" for="side-checkbox" aria-label="Открыть меню">&#9776;</label>
        <h1>Регистрация</h1>
    </div>
    <nav class="nav-buttons">
        <a href="/login.html" class="button">Sign in</a>
        <a href="/registration.html" class="button">Sign up</a>
    </nav>
</header>

<!-- боковая панель -->
<aside class="side-panel" role="search" aria-label="Боковая панель">
    <div class="side-header">
        <!-- стрелка назад -->
        <label class="side-button-2" for="side-checkbox" aria-label="Назад">&larr;</label>
        <div class="side-title">Панель</div>
    </div>
    <p>Сюда можно поместить пункты меню, настройки и т.д.</p>
</aside>

<!-- затемнение -->
<label class="overlay" for="side-checkbox" aria-hidden="true"></label>

<div class="form-wrapper">
    <form class="registration-form" id="registration-form" enctype="multipart/form-data">
        <label for="username">Имя пользователя: </label>
        <input type="text" id="username" required>
        <div id="usernameError" class="error"></div>
        <br/>

        <label for="password">Пароль: </label>
        <input type="password" id="password" required>
        <div id="passwordError" class="error"></div>
        <br/>

        <label for="email">Почта: </label>
        <input type="email" id="email" required>
        <div id="emailError" class="error"></div>
        <br/>

        <label for="date_of_birth">Дата рождения: </label>
        <input type="text" id="date_of_birth" required>
        <div id="dateOfBirthError" class="error"></div>
        <br/>

        <label for="avatar">Аватар: </label>
        <input type="file" id="avatar" accept="image/*">
        <div id="avatarError" class="error"></div>

        <div id="feedback" class="message successMessage"></div>
        <div id="errorMessage" class="message errorMessage"></div>
        <br/>

        <button type="submit">Зарегистрироваться</button>
    </form>
</div>

<script>
    function showFieldError(fieldId, message) {
        const errorDiv = document.getElementById(fieldId + "Error");
        if (errorDiv) {
            errorDiv.textContent = message;
            errorDiv.style.display = "block";
        }
    }

    function clearMessages() {
        ["username","password","email","dateOfBirth","avatar"].forEach(field => {
            const el = document.getElementById(field + "Error");
            if (el) {
                el.style.display = "none";
                el.textContent = "";
            }
        });
        document.getElementById("errorMessage").style.display = "none";
        document.getElementById("feedback").style.display = "none";
    }

    const form = document.getElementById("registration-form");
    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearMessages();

        // собираем JSON с пользователем
        const userJson = JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
            email: document.getElementById("email").value,
            dateOfBirth: document.getElementById("date_of_birth").value
        });

        const formData = new FormData();
        formData.append("user", new Blob([userJson], { type: "application/json" }));

        const avatarFile = document.getElementById("avatar").files[0];
        if (avatarFile) {
            formData.append("avatar", avatarFile);
        }

        try {
            const response = await fetch("http://localhost:8080/api/auth/registration", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                const errorJson = await response.json();

                if (errorJson.username) showFieldError("username", errorJson.username);
                if (errorJson.password) showFieldError("password", errorJson.password);
                if (errorJson.email) showFieldError("email", errorJson.email);
                if (errorJson.dateOfBirth) showFieldError("dateOfBirth", errorJson.dateOfBirth);
                if (errorJson.avatar) showFieldError("avatar", errorJson.avatar);

                if (errorJson.error || errorJson.message) {
                    const errorMsg = document.getElementById("errorMessage");
                    errorMsg.textContent = errorJson.error || errorJson.message;
                    errorMsg.style.display = "block";
                }
            } else {
                const data = await response.json();
                localStorage.setItem("jwt", data.jwt_token);

                const feedback = document.getElementById("feedback");
                feedback.textContent = "Пользователь зарегистрирован";
                feedback.style.display = "block";
                setTimeout(() => {
                    window.location.href="/music.html";
                }, 2000);
            }

        } catch (error) {
            console.error(error);
            const errorMsg = document.getElementById("errorMessage");
            errorMsg.textContent = "Необработанная ошибка";
            errorMsg.style.display="block";
        }
    });
</script>
</body>
</html>
